{% extends 'base.html' %}
{% block title %}Editar Nota{% endblock %}
{% block content %}
<div style="padding:40px; max-width:600px; margin:0 auto;">
    <h1 style="color:#2b0830; margin-bottom:30px;">Editar Nota</h1>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:16px;">
            <label style="color:#2b0830; font-weight:600;">Título</label>
            <input type="text" name="titulo" value="{{ nota.titulo }}"
                style="width:100%; padding:10px; border-radius:10px; border:1px solid #d88df4; margin-top:6px;">
        </div>
        <div style="margin-bottom:16px;">
            <label style="color:#2b0830; font-weight:600;">Descripción</label>
            <textarea name="descripcion"
                style="width:100%; padding:10px; border-radius:10px; border:1px solid #d88df4; margin-top:6px;">{{ nota.descripcion }}</textarea>
        </div>
        <div style="margin-bottom:24px;">
            <label style="color:#2b0830; font-weight:600;">Calificación (1-10)</label>
            <input type="number" name="calificacion" value="{{ nota.calificacion }}"
                min="1" max="10" step="0.01"
                style="width:100%; padding:10px; border-radius:10px; border:1px solid #d88df4; margin-top:6px;">
        </div>
        <button type="submit"
            style="background:#d88df4; color:white; border:none; padding:12px 28px; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer;">
            Guardar cambios
        </button>
        <a href="{% url 'notas:index' %}"
            style="margin-left:16px; color:#7b5c8a; font-weight:600;">Cancelar</a>
    </form>
</div>
{% endblock %}
