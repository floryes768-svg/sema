{% extends 'base.html' %}
{% block title %}Calificar Entrega{% endblock %}
{% block content %}
<div style="max-width:500px; margin:60px auto; background:white; padding:40px; border-radius:20px; box-shadow:0 8px 32px rgba(140,60,180,0.15);">
    <a href="{% url 'trabajos:detalle' entrega.trabajo.id %}" style="color:#d88df4; font-weight:600; text-decoration:none;">← Volver</a>
    <h2 style="color:#2b0830; margin:16px 0 8px;">Calificar entrega</h2>
    <p style="color:#7b5c8a; margin-bottom:24px;">Alumno: <strong>{{ entrega.alumno.username }}</strong></p>
    {% if entrega.comentario %}
        <div style="background:#faf5ff; border-radius:10px; padding:12px 16px; margin-bottom:24px;">
            <p style="color:#4b2a5f; margin:0; font-size:0.9rem;">{{ entrega.comentario }}</p>
        </div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:24px;">
            <label style="font-weight:600; color:#4b2a5f;">Calificación (0 - 100)</label>
            <input type="number" name="calificacion" required min="0" max="100" step="0.01"
                style="width:100%; padding:10px; border-radius:8px; border:1px solid #d88df4; margin-top:6px; box-sizing:border-box; outline:none;">
        </div>
        <button type="submit"
            style="width:100%; padding:12px; background:#d88df4; color:white; border:none; border-radius:10px; font-size:1.1rem; font-weight:600; cursor:pointer;">
            Guardar calificación
        </button>
    </form>
</div>
{% endblock %}
