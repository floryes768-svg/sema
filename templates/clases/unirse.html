{% extends 'base.html' %}
{% block title %}Unirse a Clase{% endblock %}
{% block content %}
<div style="max-width:500px; margin:60px auto; background:white; padding:40px; border-radius:20px; box-shadow:0 8px 32px rgba(140,60,180,0.15);">
    <h2 style="color:#2b0830; margin-bottom:8px;">Unirse a una clase</h2>
    <p style="color:#7b5c8a; margin-bottom:24px;">Ingresa el código que te dio tu maestro.</p>
    {% if error %}
        <p style="color:red; text-align:center;">{{ error }}</p>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom:24px;">
            <label style="font-weight:600; color:#4b2a5f;">Código de clase</label>
            <input type="text" name="codigo" required maxlength="6"
                placeholder="Ej: AB12CD"
                style="width:100%; padding:10px; border-radius:8px; border:1px solid #d88df4; margin-top:6px; box-sizing:border-box; outline:none; text-transform:uppercase; font-size:1.2rem; letter-spacing:4px; text-align:center;">
        </div>
        <button type="submit"
            style="width:100%; padding:12px; background:#d88df4; color:white; border:none; border-radius:10px; font-size:1.1rem; font-weight:600; cursor:pointer;">
            Unirse
        </button>
        <a href="{% url 'clases:index' %}">
            <button type="button"
                style="width:100%; padding:12px; background:#f3d6fd; color:#7b2fa0; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; margin-top:10px;">
                Cancelar
            </button>
        </a>
    </form>
</div>
{% endblock %}
